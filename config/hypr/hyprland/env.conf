# ######### Input method ##########
# See https://fcitx-im.org/wiki/Using_Fcitx_5_on_Wayland
# env = QT_IM_MODULE, fcitx
# env = XMODIFIERS, @im=fcitx
# env = SDL_IM_MODULE, fcitx
# env = GLFW_IM_MODULE, ibus
# env = INPUT_METHOD, fcitx

# ############ Wayland #############
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ############ Themes #############
env = QT_QPA_PLATFORM, wayland
env = XDG_MENU_PREFIX, plasma-

# ######## Wayland #########
# Tearing
env = WLR_DRM_NO_ATOMIC, 0
env = WLR_NO_HARDWARE_CURSORS, 0
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11

# ######## Virtual envrionment #########
# env = ILLOGICAL_IMPULSE_VIRTUAL_ENV, ~/.local/state/quickshell/.venv

# ######## Terminal application #########
env = TERMINAL,kitty -1

env = QT_QPA_PLATFORMTHEME,gtk4

# env = XCURSOR_THEME,Breeze_Snow
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,48  # 48 pode ser muito grande, mas se você curte o estilo 'Sênior', pode manter!
