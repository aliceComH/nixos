# set_wallpaper.sh usa wallpapers/1.jpeg; gera hyprlang em ~/.local/state/.../hyprpaper.conf. Sleep: layer-shell no arranque.
exec-once = bash /home/alice/.config/hypr/hyprland/scripts/set_wallpaper.sh && sleep 0.75 && hyprpaper -c /home/alice/.local/state/nixos-wallpaper/hyprpaper.conf
# Audio
# exec-once = easyeffects --gapplication-service & disown
