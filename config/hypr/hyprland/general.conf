# MONITOR CONFIG

# monitor=,3840x2160@144,auto,1
# monitor=HDMI-A-1,3840x2160@120,auto,1,vrr,1
# monitor=,1920x1080@60,auto,1
# monitor=HDMI-A-1, 3840x2160@144, 0x0, 1, bitdepth, 8
monitor=HDMI-A-1, 3840x2160@143.97, 0x0, 1, bitdepth, 10
# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

general {
    # Gaps and border
    gaps_in = 0
    gaps_out = 0
    gaps_workspaces = 0

    border_size = 0
    col.active_border = rgba(0DB7D4FF)
    col.inactive_border = rgba(31313600)
    resize_on_border = false

    no_focus_fallback = true

    allow_tearing = false # This just allows the `immediate` window rule to work

    snap {
    	enabled = true
    	window_gap = 0
    	monitor_gap = 0
    	respect_gaps = true
    }
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
    precise_mouse_move = true
}

decoration {
    rounding = 0 #18

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 8
        passes = 4
        brightness = 1
        noise = 0.04
        contrast = 1
        popups = true
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 30
        offset = 0 2
        render_power = 4
        color = rgba(00000010)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.025
    dim_special = 0.07
}

animations {
    enabled = yes
    bezier = fastDecel, 0, 1, 0, 1
    bezier = direct, 0.2, 0, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 2, fastDecel, slide
    animation = windowsIn, 1, 1.8, fastDecel, slide
    animation = windowsOut, 1, 1.5, direct, slide
    animation = windowsMove, 1, 2, fastDecel, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 20, liner, loop
    animation = fade, 1, 2, default
    animation = workspaces, 1, 1, fastDecel, slide
}

input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    repeat_rate = 50
    repeat_delay = 300

    numlock_by_default = true
    left_handed = false
    float_switch_override_focus = 1  

    follow_mouse = 1
    mouse_refocus = true

    # touchpad {
    # disable_while_typing=true
    # natural_scroll=true 
    # clickfinger_behavior=false
    # middle_button_emulation=true
    # tap-to-click=true
    # drag_lock=false
    # }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = 1
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    # removido no Hyprland 0.54 — ver misc:on_focus_under_fullscreen se precisares do mesmo comportamento
    allow_session_lock_restore = true
    session_lock_xray = true
    initial_workspace_tracking = false
    focus_on_activate = false
    middle_click_paste = true
}

render {
    # 0 off, 1 on, 2 auto (Hyprland 0.54+: bool/int; evita erro de parse com true)
    direct_scanout = 1

    # explicit sync / KMS sync options may help
    #explicit_sync = 2
    #explicit_sync_kms = 2
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
    drag_threshold = 5
}

cursor {
    zoom_factor = 1
    zoom_rigid = false
    hotspot_padding = 1 # the padding, in logical px, between screen edges and the cursor
    sync_gsettings_theme = true
    no_hardware_cursors = 0
    enable_hyprcursor = true
    warp_on_change_workspace = 0
    # inactive_timeout = 3 # Esconde o cursor após 3 segundos de inatividade (limpa o visual no vídeo)
    no_warps = true 
}
