# ######## Window rules — General ########

# Uncomment to apply global transparency to all windows:
# windowrulev2 = opacity 0.89 override 0.89 override, class:.*

# Disable blur for xwayland context menus
windowrulev2 = noblur,class:^()$,title:^()$
# windowrulev2 = noblur, xwayland:1
windowrulev2 = noblur, fullscreen:1
windowrulev2 = opacity 1.0 1.0, fullscreen:1

# windowrulev2 = opacity 0.80 0.80,class:^(firefox)$
windowrulev2 = opacity 0.90 0.90,class:^(org.telegram.desktop)$
windowrulev2 = opacity 0.90 0.90,class:^(thunar)$
windowrulev2 = opacity 0.90 0.90,class:^(code)$
