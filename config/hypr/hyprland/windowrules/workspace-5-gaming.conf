# ######## Workspace rules — Workspace 5 (Gaming) ########

# Workspace display settings: no rounding, gaps or borders
workspace = 5, rounding:false, gapsin:0, gapsout:0, border:false

# (removed 0.54) layerrule = noanim,5  # per-workspace layer rules use match:namespace; adjust via hyprctl layers if needed
# (removed 0.54) layerrule = ignorezero,5  # per-workspace layer rules use match:namespace; adjust via hyprctl layers if needed

# Force all Steam games to workspace 5 silently (syntax 0.54+).
windowrule = match:class ^(steam_app_.*)$, workspace 5 silent
windowrule = match:initial_class ^(steam_app_.*)$, workspace 5 silent
windowrule = match:class ^(dota2.*)$, workspace 5 silent
windowrule = match:class ^(Albion.*)$, workspace 5 silent
windowrule = match:class ^(Albion-Online)$, match:title ^(Albion Online Client)$, workspace 5 silent
windowrule = match:class ^(osu!)$, match:title ^(osu!)$, workspace 5 silent

# Performance rules for osu! (seguindo o seu padrão de games)
windowrule = float on, match:class ^(osu!)$
windowrule = fullscreen on, match:class ^(osu!)$
windowrule = opaque on, match:class ^(osu!)$
windowrule = border_size 0, match:class ^(osu!)$
windowrule = no_shadow on, match:class ^(osu!)$
windowrule = no_anim on, match:class ^(osu!)$
windowrule = content game, match:class ^(osu!)$
windowrule = immediate on, match:class ^(osu!)$

# Make Steam games float
windowrule = float on, match:class ^steam_app_.*$
windowrule = float on, match:class ^dota2*$
# windowrulev2 = contenttype:game, class:^steam_app_.*$

# Force fullscreen
windowrule = fullscreen on, match:class ^steam_app_.*$
# windowrulev2 = fullscreenstate:fullscreen, class:^steam_app_.*$
windowrule = fullscreen on, match:class ^dota2*$
# windowrulev2 = fullscreenstate:fullscreen, class:^dota2*$

# Direct scanout-friendly rules (removes extra effects)
windowrule = opaque on, match:class ^steam_app_.*$
windowrule = border_size 0, match:class ^steam_app_.*$
windowrule = no_shadow on, match:class ^steam_app_.*$
windowrule = no_anim on, match:class ^steam_app_.*$
windowrule = opaque on, match:class ^dota2*$
windowrule = border_size 0, match:class ^dota2*$
windowrule = no_shadow on, match:class ^dota2*$
windowrule = no_anim on, match:class ^dota2*$
# windowrulev2 = immediate, class:^steam_app_.*$

# Set content type to "game" (may help with special behavior or direct scanout)
# windowrulev2 = contenttype:game, class:^steam_app_.*$
# windowrulev2 = contenttype:game, class:^dota2*$

# Regra específica para o Gamescope
windowrule = immediate on, match:class ^(gamescope)$
windowrule = fullscreen on, match:class ^(gamescope)$
windowrule = monitor 0, match:class ^(gamescope)$
windowrule = workspace 5 silent, match:class ^(gamescope)$

# Opcional: remover blur/gaps quando o gamescope estiver aberto para garantir performance
windowrule = no_blur on, match:class ^(gamescope)$
windowrule = no_dim on, match:class ^(gamescope)$
