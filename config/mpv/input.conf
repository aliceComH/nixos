# Interpolação VapourSynth/MVTools
# Ctrl+I  → liga o perfil [interp] (FlowFPS para display_fps)
# Ctrl+I com Shift → desliga, volta ao modo normal
ctrl+i       apply-profile interp; show-text "Interpolação ON (MVTools → display_fps)"
ctrl+I       change-list vf clr ""; set video-sync audio; set hwdec auto-safe; show-text "Interpolação OFF"
