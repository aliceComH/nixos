# ── Base ──────────────────────────────────────────────────────────────────────
video-sync=audio
hwdec=auto-safe
keep-open=yes

# ── Perfil: interpolação via VapourSynth + MVTools ────────────────────────────
# Activar:   Ctrl+I   (ver input.conf)
# Desactivar: Ctrl+Shift+I
[interp]
# Força decodificação por software para que os frames cheguem ao VapourSynth
# em memória da CPU (hwdec passa frames em GPU, incompatível com MVTools).
hwdec=no
vf=vapoursynth=~/.config/mpv/filters/interpolation.vpy:buffered-frames=4:concurrent-frames=4
video-sync=display-resample
hr-seek-framedrop=no
