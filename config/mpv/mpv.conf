# ── Base ──────────────────────────────────────────────────────────────────────
video-sync=audio
hwdec=auto-safe
keep-open=yes

# ── Perfil: Interpolação vetorial (MVTools, estilo SVP) ──────────────────────
[interp-vector]
hwdec=auto-copy
vf=vapoursynth=~/.config/mpv/filters/interpolation.vpy:buffered-frames=16:concurrent-frames=16
video-sync=display-resample
display-fps-override=120
hr-seek-framedrop=no
